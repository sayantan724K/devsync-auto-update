name: Daily Auto Commit

on:
  schedule:
    - cron: "30 0 * * *"  # Runs daily at 00:30 UTC
  workflow_dispatch:      # Allows manual run

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Update file by 22f3002449@ds.study.iitm.ac.in
      run: |
        echo "Last updated on $(date)" > daily_update.txt

    - name: Commit changes
      run: |
        git config --global user.email "22f3002449@ds.study.iitm.ac.in"
        git config --global user.name "Sayantan Auto Bot"
        git add .
        git commit -m "Daily update: $(date)"
        git push
